<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPUP.AI | Orbit Terverifikasi</title>

    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700;800&family=Urbanist:ital,wght@1,900&display=swap" rel="stylesheet">

    <style>
        :root { --popup-orange: #FF4D00; }

        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100%;
        }

        /* --- BACKGROUND ENGINE 8K --- */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #050505;
        }

        #bg-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* Kalibrasi visual: Brightness dinaikkan agar planet terlihat jelas */
            filter: contrast(1.1) brightness(1.2);
            transition: opacity 0.8s ease-in-out;
        }

        /* OVERLAY GRADIENT */
        .hero-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            background: 
                linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 55%, transparent 100%),
                linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 100%);
        }

        /* UI CONTENT */
        nav, main {
            position: relative;
            z-index: 20;
        }

        .hero-title {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(3.5rem, 11vw, 8.5rem);
            line-height: 0.85;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.05em;
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- BACKGROUND ENGINE -->
    <div id="bg-container">
        <!-- Jalur Jinja2 untuk Flask -->
        <img 
            src="{{ url_for('static', filename='dreamina-2026-04-10-9380.jpg') }}" 
            id="orbit-visual"
            alt="Popup AI Universe Background"
            onerror="handleImageError(this)"
        >
    </div>

    <div class="hero-overlay"></div>

    <!-- NAVIGASI -->
    <nav class="fixed w-full z-50 px-12 py-10 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center font-black text-black shadow-lg shadow-orange-600/20 rotate-6">P</div>
            <span class="text-2xl font-black italic tracking-tighter uppercase font-urbanist">POPUP<span class="text-orange-600">.AI</span></span>
        </div>

        <div class="flex items-center gap-4 status-pill px-6 py-2.5 rounded-full">
            <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            <span id="status-text" class="text-[9px] font-black uppercase tracking-[0.2em] text-green-500">Orbit Live</span>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="h-screen flex flex-col justify-center px-12 md:px-24">
        <div class="max-w-5xl">
            <p class="text-orange-500 font-black tracking-[0.6em] uppercase text-[10px] mb-8">Misi Peradaban 2026</p>
            <h1 class="hero-title mb-10">
                Enter the <br><span class="text-orange-600">AI Universe.</span>
            </h1>
            <p class="text-xl md:text-2xl text-white/60 font-light max-w-2xl leading-relaxed mb-14">
                Visual 8K telah dikalibrasi ulang. Sistem navigasi mendeteksi sinkronisasi <span class="text-white font-bold italic">dunia baru</span> Anda berjalan stabil.
            </p>
            <button class="bg-[#FF4D00] px-20 py-6 rounded-full text-[12px] font-black uppercase tracking-[0.4em] text-white shadow-[0_20px_50px_rgba(255,77,0,0.3)] hover:scale-105 active:scale-95 transition-all">
                Launch Universe
            </button>
        </div>
    </main>

    <script>
        const img = document.getElementById('orbit-visual');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        // Fungsi penanganan jika gambar gagal (atau jika Jinja2 tidak memproses path)
        function handleImageError(element) {
            console.log("POPUP.AI | Mencoba jalur alternatif...");
            // Jika dibuka secara lokal (file://), kita arahkan ke folder static secara manual
            if (window.location.protocol === 'file:') {
                element.src = 'static/dreamina-2026-04-10-9380.jpg';
            } else {
                // Fallback ke Cloud jika di server tapi file tidak ada
                element.src = 'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2000';
            }
        }

        // Cek Protokol saat halaman dimuat
        window.onload = () => {
            if (img.src.includes('{{') || window.location.protocol === 'file:') {
                console.log("%c POPUP.AI | MODE PRATINJAU STATIS AKTIF ", "background: #1e293b; color: #fbbf24; font-weight: bold; padding: 4px;");
                statusText.innerText = "Preview Mode";
                statusText.className = "text-[9px] font-black uppercase tracking-[0.2em] text-yellow-500";
                statusDot.className = "w-2 h-2 bg-yellow-500 rounded-full animate-pulse shadow-[0_0_10px_#fbbf24]";
                
                // Paksa pemuatan gambar untuk mode lokal
                if (img.src.includes('{{')) handleImageError(img);
            } else {
                console.log("%c POPUP.AI | ORBIT LIVE & CONNECTED ", "background: #FF4D00; color: #000; font-weight: bold; padding: 4px;");
            }
        };
    </script>
</body>
</html>
