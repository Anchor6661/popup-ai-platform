<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPUP.AI | Orbit Terverifikasi</title>
    
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700;800&family=Urbanist:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { --popup-orange: #FF4D00; }
        
        body, html { 
            margin: 0; padding: 0; 
            background-color: #000; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* --- BACKGROUND ENGINE (CALIBRATED) --- */
        #bg-container {
            position: fixed; 
            inset: 0; 
            z-index: -2;
            background-color: #050505;
        }

        #bg-container img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            /* PERBAIKAN: Kecerahan dinaikkan ke 1.3 agar tidak gelap */
            filter: contrast(1.1) brightness(1.3);
            transition: opacity 1s ease-in-out;
        }

        .hero-overlay {
            position: fixed; 
            inset: 0;
            /* PERBAIKAN: Gradient dikurangi kepekatannya agar gambar terlihat */
            background: linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 60%, transparent 100%),
                        linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .hero-title {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(3rem, 10vw, 8.5rem);
            line-height: 0.85;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND ENGINE -->
    <div id="bg-container">
        <!-- Sintaks super bersih untuk menghindari error 'got B' -->
        <img src="{{ url_for('static', filename=bg_image) }}" 
             id="orbit-visual"
             onerror="this.src='https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2000';">
    </div>
    
    <div class="hero-overlay"></div>

    <nav class="fixed w-full z-50 px-12 py-10 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-9 h-9 bg-orange-600 rounded-xl flex items-center justify-center font-black text-black shadow-lg shadow-orange-600/20 rotate-6">P</div>
            <span class="text-2xl font-black italic tracking-tighter uppercase font-urbanist">POPUP<span class="text-orange-600">.AI</span></span>
        </div>
        
        <div class="flex items-center gap-4 bg-black/40 backdrop-blur-md px-6 py-2 rounded-full border border-white/5">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            <span class="text-[9px] font-black uppercase tracking-widest text-green-500">Orbit Live</span>
        </div>
    </nav>

    <main class="relative z-10 h-screen flex flex-col justify-center px-12 md:px-24">
        <div class="max-w-4xl">
            <p class="text-orange-500 font-black tracking-[0.5em] uppercase text-[10px] mb-8">Misi Peradaban 2026</p>
            <h1 class="hero-title mb-10">
                Enter the <br><span class="text-orange-600">AI Universe.</span>
            </h1>
            <p class="text-xl md:text-2xl text-white/50 font-light max-w-xl leading-relaxed mb-14">
                Visual 8K telah dikalibrasi ulang. Sinyal sekarang stabil dan terang. Selamat datang di <span class="text-white font-bold italic">dunia baru</span> Anda.
            </p>
            <button class="bg-[#FF4D00] px-20 py-6 rounded-full text-[11px] font-black uppercase tracking-[0.3em] text-white shadow-2xl hover:scale-105 transition-all">
                Launch Universe
            </button>
        </div>
    </main>

    <script>
        // Verifikasi terakhir di konsol
        const img = document.getElementById('orbit-visual');
        img.onload = () => console.log("%c POPUP.AI | SINYAL VISUAL TERANG & STABIL ", "color: #22c55e; font-weight: bold;");
    </script>
</body>
</html>
