<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPUP.AI | Orbit Terverifikasi</title>
    
    <!-- Mencegah error favicon 404 -->
    <link rel="icon" href="data:,">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700;800&family=Urbanist:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { --popup-orange: #FF4D00; }
        
        body, html { 
            margin: 0; padding: 0; 
            background-color: #050505; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            height: 100vh; 
        }

        /* --- BACKGROUND ENGINE 8K (STABIL) --- */
        #hero-bg {
            position: fixed; 
            inset: 0; 
            z-index: -2;
            background-color: #000;
        }

        #hero-bg img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            filter: contrast(1.1) brightness(0.9);
            opacity: 1 !important; 
        }

        .page-overlay {
            position: fixed; 
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.1) 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.95) 100%);
            z-index: -1;
        }

        .hero-title {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(3.5rem, 12vw, 8.5rem);
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -0.05em;
            font-style: italic;
        }

        .orbit-gradient-text {
            background: linear-gradient(90deg, #ff5722, #ff9100);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #orbit-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="orbit-status">Orbit: <span id="sync-text" class="text-orange-500">Menyambungkan...</span></div>

    <!-- BACKGROUND ENGINE -->
    <div id="hero-bg">
        <!-- Sintaks Jinja2 dengan pengaman tambahan -->
        <img src="{{ url_for('static', filename=bg_image|default('dreamina-orbit.jpg')) }}" 
             id="main-bg"
             onerror="this.src='https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=2000'; document.getElementById('sync-text').innerText = 'Cloud Active';"
             alt="8K Universe Background">
    </div>

    <div class="page-overlay"></div>

    <nav class="fixed w-full z-50 px-12 py-10 flex items-center justify-between backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center font-black text-black text-xs rotate-6 shadow-lg shadow-orange-600/20">P</div>
            <span class="text-2xl font-black italic tracking-tighter uppercase font-urbanist">POPUP<span class="text-orange-600">.AI</span></span>
        </div>
    </nav>

    <main class="relative z-10 h-screen flex flex-col justify-center px-12 md:px-24">
        <div class="max-w-5xl">
            <p class="text-orange-500 font-black tracking-[0.6em] uppercase text-[10px] mb-8">Misi Peradaban 2026</p>
            <h1 class="hero-title mb-10">
                Enter the <br><span class="orbit-gradient-text">AI Universe.</span>
            </h1>
            <p class="text-xl md:text-2xl text-white/50 font-light max-w-2xl leading-relaxed mb-14">
                Sistem visual kini lebih stabil. Pastikan Anda mengakses melalui <span class="text-white font-bold italic underline">http://127.0.0.1:5000</span> untuk integrasi penuh dengan mesin Flask.
            </p>
            <button class="bg-[#FF4D00] px-20 py-6 rounded-full text-[12px] font-black uppercase tracking-[0.3em] text-white shadow-2xl hover:bg-orange-500 transition-all active:scale-95">
                Launch Universe
            </button>
        </div>
    </main>

    <script>
        const img = document.getElementById('main-bg');
        const syncText = document.getElementById('sync-text');

        // Deteksi cerdas: Jika dibuka secara statis, arahkan jalur ke folder lokal
        if (img.src.includes('{{') || img.src.includes('%7B%7B')) {
            console.log("POPUP.AI | Mode Pratinjau Statis Aktif.");
            syncText.innerText = "Preview Mode";
            syncText.classList.replace('text-orange-500', 'text-blue-400');
            
            // Mencoba mencari file di folder static secara relatif jika dibuka dari templates/
            img.src = "../static/dreamina-orbit.jpg";
        } else {
            img.onload = () => {
                syncText.innerText = "Connected & Live";
                syncText.classList.replace('text-orange-500', 'text-green-500');
                console.log("%c POPUP.AI | ORBIT STABLE ", "background: #FF4D00; color: #000; font-weight: bold; padding: 5px;");
            };
        }
    </script>

</body>
</html>
