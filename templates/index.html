<link rel="icon" href="data:,">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700;800&family=Urbanist:ital,wght@1,900&display=swap" rel="stylesheet">

<style>
    :root { --popup-orange: #FF4D00; }
    body, html { 
        margin: 0; padding: 0; 
        background-color: #050505; 
        color: white; 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        overflow-x: hidden; 
        height: 100vh; 
    }

    /* --- BACKGROUND ENGINE 8K --- */
    #hero-bg {
        position: fixed; inset: 0; z-index: -2;
        background-color: #050505;
    }

    #hero-bg img {
        width: 100%; height: 100%; object-fit: cover; display: block;
        filter: contrast(1.1) brightness(0.85);
        transition: opacity 0.8s ease-in-out;
    }

    .page-overlay {
        position: fixed; inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
        z-index: -1;
    }

    .hero-title {
        font-family: 'Urbanist', sans-serif;
        font-size: clamp(3.5rem, 12vw, 8.5rem);
        line-height: 0.85;
        font-weight: 900;
        letter-spacing: -0.05em;
        font-style: italic;
    }

    .orbit-gradient-text {
        background: linear-gradient(90deg, #ff5722, #ff9100);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    #status-info {
        position: fixed; bottom: 20px; left: 20px;
        font-size: 8px; font-weight: 900; letter-spacing: 2px;
        color: rgba(255,255,255,0.2); text-transform: uppercase; z-index: 50;
    }
</style>


<div id="status-info">Orbit Status: Connected & Verified</div>

<!-- BACKGROUND ENGINE -->
<div id="hero-bg">
    <!-- PENTING: Menggunakan variabel bg_image yang dikirim dari app.py -->
    <img src="{{ url_for('static', filename=bg_image) }}" 
         id="main-bg"
         onerror="this.src='https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=2000'; console.warn('Aset Lokal 404, Mengaktifkan Cloud Backup');"
         alt="8K Universe Background">
</div>
<div class="page-overlay"></div>

<nav class="fixed w-full z-50 px-12 py-10 flex items-center justify-between backdrop-blur-xl border-b border-white/5">
    <div class="flex items-center space-x-3">
        <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center font-black text-black text-xs rotate-6 shadow-lg shadow-orange-600/20">P</div>
        <span class="text-2xl font-black italic tracking-tighter uppercase">POPUP<span class="text-orange-600">.AI</span></span>
    </div>
    <div class="hidden md:flex space-x-14 text-[10px] font-black uppercase tracking-[0.4em] text-white/40">
        <a href="/" class="text-white">Beranda</a>
        <a href="/movies" class="hover:text-white transition-colors">Movies</a>
        <a href="/music" class="hover:text-white transition-colors">Music</a>
    </div>
</nav>

<main class="relative z-10 h-screen flex flex-col justify-center px-12 md:px-24">
    <div class="max-w-5xl">
        <p class="text-orange-500 font-black tracking-[0.6em] uppercase text-[10px] mb-8">Misi Peradaban 2026</p>
        <h1 class="hero-title mb-10">
            Enter the <br><span class="orbit-gradient-text">AI Universe.</span>
        </h1>
        <p class="text-xl md:text-2xl text-white/50 font-light max-w-2xl leading-relaxed mb-14">
            Sistem sinkronisasi berhasil. Selamat beristirahat, Chef. Orbit visual 8K sudah terkunci dengan stabil.
        </p>
        <button class="bg-[#FF4D00] px-20 py-6 rounded-full text-[12px] font-black uppercase tracking-[0.3em] text-white shadow-2xl active:scale-95 transition-all">
            Launch Platform
        </button>
    </div>
</main>

<script>
    console.log("POPUP.AI | Background path: " + document.getElementById('main-bg').src);
</script>
