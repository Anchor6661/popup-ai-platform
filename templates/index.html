<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPUP.AI | Portal Galaksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --popup-orange: #FF4D00;
            --deep-void: #050608;
            /* Warna Nebula dibuat lebih pekat agar tidak terasa "jauh" */
            --nebula-orange: rgba(255, 77, 0, 0.15);
            --nebula-magenta: rgba(255, 0, 212, 0.08);
            --nebula-blue: rgba(0, 102, 255, 0.05);
        }

        * { cursor: crosshair; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--deep-void);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- THE LIVING UNIVERSE (DIPERDEKAT) --- */
        .universe-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0a0c10 0%, var(--deep-void) 100%);
        }

        /* Nebula Orange (Lebih Fokus) */
        .nebula-orange {
            position: absolute;
            top: -20%; right: -10%; width: 80%; height: 80%;
            background: radial-gradient(circle, var(--nebula-orange) 0%, transparent 70%);
            filter: blur(80px);
            animation: cosmicDrift 20s ease-in-out infinite;
        }

        /* Nebula Magenta (Menambah Kedalaman Visual) */
        .nebula-magenta {
            position: absolute;
            bottom: -10%; left: -10%; width: 70%; height: 70%;
            background: radial-gradient(circle, var(--nebula-magenta) 0%, transparent 70%);
            filter: blur(90px);
            animation: cosmicDrift 25s ease-in-out infinite reverse;
        }

        @keyframes cosmicDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-5%, 5%) scale(1.1); }
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 20% 30%, #ffffff, transparent),
                radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 40% 80%, var(--popup-orange), transparent);
            background-size: 300px 300px;
            opacity: 0.2;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .massive-title {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.05em;
            /* Efek Kilau Teks */
            background: linear-gradient(180deg, #FFFFFF 30%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .massive-title span { color: var(--popup-orange); }

        .slogan {
            font-size: 0.75rem;
            letter-spacing: 1.2em;
            color: var(--popup-orange);
            text-transform: uppercase;
            font-weight: 800;
            margin-top: 3rem;
            opacity: 0.6;
        }
    </style>
</head>
<body onload="checkAuthParams()">

    <div class="universe-container">
        <div class="nebula-orange"></div>
        <div class="nebula-magenta"></div>
        <div class="stars"></div>
    </div>

    <header class="fixed top-0 left-0 w-full p-10 flex justify-between items-center z-[100]">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='/'">
            <div class="w-10 h-10 border border-[#FF4D00]/50 rounded-full flex items-center justify-center backdrop-blur-md">
                <span class="text-[#FF4D00] text-[10px] font-black">P</span>
            </div>
            <h1 class="text-xl font-black tracking-tighter">POPUP<span>.Ai</span></h1>
        </div>
        <button id="nav-signin" onclick="location.href='/?code=auth'" class="bg-white text-black px-8 py-2.5 rounded-full text-[0.6rem] font-black tracking-widest uppercase hover:bg-[#FF4D00] hover:text-white transition-all">Sign In</button>
    </header>

    <main class="hero">
        <div class="relative">
            <h1 class="massive-title" id="main-title">POPUP<span>.AI</span></h1>
            <p class="slogan">Pop Up Your World</p>
        </div>
    </main>

    <script>
        function checkAuthParams() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('code')) {
                const btn = document.getElementById('nav-signin');
                btn.innerText = "Serashii ✓";
                btn.classList.add('bg-[#FF4D00]', 'text-white');
                window.history.replaceState({}, document.title, "/");
            }
        }

        // Efek Parallax Halus agar tidak terasa "jauh"
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const title = document.getElementById('main-title');
            title.style.transform = `translateY(${scrolled * 0.3}px) scale(${1 + scrolled * 0.0005})`;
            title.style.opacity = 1 - (scrolled * 0.002);
        });
    </script>
</body>
</html>
