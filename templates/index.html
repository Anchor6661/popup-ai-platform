<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPUP.AI | Orbit Terverifikasi</title>
    
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700;800&family=Urbanist:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { --popup-orange: #FF4D00; }
        body, html { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }

        /* --- BACKGROUND ENGINE 8K --- */
        #bg-layer {
            position: fixed; inset: 0; z-index: -2;
            background-color: #050505;
        }

        #bg-layer img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            filter: contrast(1.1) brightness(0.85);
        }

        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: -1;
        }

        .hero-title {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.85;
            font-weight: 900;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND ENGINE -->
    <div id="bg-layer">
        <!-- Sintaks paling bersih, tanpa embel-embel agar tidak error 'got B' -->
        <img src="{{ url_for('static', filename=bg_image) }}" 
             onerror="this.src='https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2000';">
    </div>
    
    <div class="overlay"></div>

    <nav class="fixed w-full z-50 px-10 py-10 flex items-center">
        <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center font-black text-black text-xs rotate-6">P</div>
        <span class="ml-3 text-2xl font-black italic tracking-tighter uppercase">POPUP<span class="text-orange-600">.AI</span></span>
    </nav>

    <main class="relative z-10 h-screen flex flex-col justify-center px-10 md:px-24">
        <p class="text-orange-500 font-black tracking-[0.5em] uppercase text-[10px] mb-6">Misi Peradaban 2026</p>
        <h1 class="hero-title mb-8">
            Enter the <br><span class="text-orange-600">AI Universe.</span>
        </h1>
        <p class="text-xl text-white/50 font-light max-w-xl leading-relaxed mb-12">
            Orbit stabil. Pastikan Chef menggunakan <span class="text-white font-bold italic">http://127.0.0.1:5000</span> untuk melihat visual planet 8K.
        </p>
        <button class="bg-[#FF4D00] w-64 py-5 rounded-full text-[11px] font-black uppercase tracking-[0.3em] text-white shadow-2xl">
            Launch Platform
        </button>
    </main>

</body>
</html>
